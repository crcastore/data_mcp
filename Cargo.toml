[package]
name = "mcp"
version = "0.1.0"
edition = "2024"

[dependencies]
polars = { version = "0.53", features = ["csv", "lazy"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "profiling_bench"
harness = false
